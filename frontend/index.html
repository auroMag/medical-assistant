<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAssist — Assistente Sanitario</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0d3d52 0%, #1a5f7a 50%, #2d8bac 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo .logo-circle {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 28px;
    }

    .auth-logo h1 {
      font-family: 'DM Serif Display', serif;
      color: white;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .auth-logo p {
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .auth-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-muted);
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .auth-form { padding: 2rem; }

    .auth-form h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--primary-dark);
      margin-bottom: 0.4rem;
    }

    .auth-form p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 1.6rem;
    }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 1rem 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .hidden { display: none; }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 4px;
    }

    .password-wrapper .form-input {
      padding-right: 40px;
    }
  </style>
</head>
<body>
  <div class="auth-container fade-in">
    <div class="auth-logo">
      <div class="logo-circle">🏥</div>
      <h1>MediAssist</h1>
      <p>Il tuo assistente sanitario personale</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Accedi</button>
        <button class="auth-tab" onclick="showTab('register')">Registrati</button>
      </div>

      <!-- LOGIN -->
      <div id="loginForm" class="auth-form">
        <h2>Bentornato</h2>
        <p>Inserisci le tue credenziali per accedere</p>

        <div id="loginAlert"></div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="mario.rossi@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="La tua password">
            <button class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleLogin()">
          <span id="loginBtnText">Accedi</span>
        </button>

        <div class="divider">oppure</div>

        <button class="btn btn-secondary btn-full" onclick="showTab('register')">
          Crea un nuovo account
        </button>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" class="auth-form hidden">
        <h2>Crea account</h2>
        <p>Registrati per accedere all'assistente medico</p>

        <div id="registerAlert"></div>

        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input type="text" id="regName" class="form-input" placeholder="Mario Rossi">
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="mario.rossi@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">Telefono (opzionale)</label>
          <input type="tel" id="regPhone" class="form-input" placeholder="+39 333 1234567">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" class="form-input" placeholder="Minimo 6 caratteri">
            <button class="password-toggle" onclick="togglePassword('regPassword', this)">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Conferma password</label>
          <div class="password-wrapper">
            <input type="password" id="regConfirm" class="form-input" placeholder="Ripeti la password">
            <button class="password-toggle" onclick="togglePassword('regConfirm', this)">👁</button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleRegister()">
          <span id="registerBtnText">Crea account</span>
        </button>

        <div class="divider">oppure</div>

        <button class="btn btn-secondary btn-full" onclick="showTab('login')">
          Ho già un account
        </button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8080';

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    }

    function showAlert(id, msg, type = 'error') {
      const el = document.getElementById(id);
      el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) return showAlert('loginAlert', 'Inserisci email e password');

      const btn = document.querySelector('#loginForm .btn-primary');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(`${API}/api/patients/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.status === 401) {
          showAlert('loginAlert', 'Email o password errati');
          return;
        }

        if (!res.ok) throw new Error();

        const patient = await res.json();
        sessionStorage.setItem('patient', JSON.stringify(patient));
        window.location.href = 'chat.html';

      } catch (e) {
        showAlert('loginAlert', 'Errore di connessione al server');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Accedi';
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;

      if (!name || !email || !password) return showAlert('registerAlert', 'Nome, email e password sono obbligatori');
      if (password !== confirm) return showAlert('registerAlert', 'Le password non coincidono');
      if (password.length < 6) return showAlert('registerAlert', 'La password deve essere di almeno 6 caratteri');

      const btn = document.querySelector('#registerForm .btn-primary');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(`${API}/api/patients/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone: phone || null, password })
        });

        if (res.status === 400) {
          showAlert('registerAlert', 'Email già registrata. Prova ad accedere.');
          return;
        }

        if (!res.ok) throw new Error();

        const patient = await res.json();
        sessionStorage.setItem('patient', JSON.stringify(patient));
        showAlert('registerAlert', 'Account creato! Reindirizzamento...', 'success');
        setTimeout(() => window.location.href = 'chat.html', 1200);

      } catch (e) {
        showAlert('registerAlert', 'Errore durante la registrazione');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Crea account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginVisible = !document.getElementById('loginForm').classList.contains('hidden');
        loginVisible ? handleLogin() : handleRegister();
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('patient')) {
      window.location.href = 'chat.html';
    }
  </script>
</body>
</html>
