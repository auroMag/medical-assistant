version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: medical_postgres
    environment:
      POSTGRES_USER: medicaluser
      POSTGRES_PASSWORD: medicalpass
      POSTGRES_DB: medicaldb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: medical_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
